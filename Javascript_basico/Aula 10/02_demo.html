<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aula 10 - Demonstração</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Courier New', monospace; background: #f8fafc; }
.topbar { position: fixed; top: 0; left: 0; right: 0; height: 50px; background: #1e293b; color: #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 100; }
.topbar h1 { font-size: 16px; font-weight: normal; }
.timer { font-size: 14px; }
.controls { position: fixed; top: 50px; left: 0; right: 0; height: 44px; background: #334155; display: flex; align-items: center; gap: 8px; padding: 0 16px; z-index: 99; }
.controls button { background: #475569; color: #e2e8f0; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; font-family: inherit; }
.controls button:hover { background: #64748b; }
.container { display: flex; margin-top: 94px; height: calc(100vh - 94px - 60px); }
.editor { width: 50%; background: #1e293b; color: #e2e8f0; padding: 16px; overflow-y: auto; font-size: 14px; line-height: 1.6; }
.output { width: 50%; background: #ecfeff; color: #0f172a; padding: 16px; overflow-y: auto; font-size: 14px; line-height: 1.6; }
.code-line { white-space: pre-wrap; }
.code-line .k { color: #c084fc; }
.code-line .s { color: #fbbf24; }
.footer { position: relative; height: 60px; background: #1e293b; color: #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; font-size: 14px; }
.footer a { color: #38bdf8; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="topbar">
  <h1>💻 Aula 10 · Demonstração</h1>
  <div class="timer" id="timer">⏱ 0.0s</div>
</div>
<div class="controls">
  <button onclick="runCode()">▶ Executar</button>
  <button onclick="resetAll()">⏹ Reset</button>
  <button onclick="toggleSpeed()">⚡ Rápido</button>
</div>
<div class="container">
  <div class="editor" id="editor"></div>
  <div class="output" id="output"></div>
</div>
<div class="footer">
  <span>💻 Aula 10 · Projeto @karizeviecelli</span>
  <a href="03_pratica.html">➜ Seguir para a Prática</a>
</div>
<script>
const codeLines = [
  'let tarefas = ["Estudar", "Praticar"];',
  'tarefas.push("Revisar");',
  'tarefas.forEach(t => console.log(t));',
  'localStorage.setItem("tarefas",',
  'JSON.stringify(tarefas));',
  ''
];

function highlightLine(line) {
  let escaped = line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const keywords = ['let', 'console', 'log', 'localStorage', 'JSON', 'stringify', 'forEach', 'push'];
  for (let kw of keywords) {
    const regex = new RegExp('\\b(' + kw + ')\\b', 'g');
    escaped = escaped.replace(regex, '<span class="k">$1</span>');
  }
  escaped = escaped.replace(/"([^"]*)"/g, '<span class="s">"$1"</span>');
  return escaped;
}

const editorEl = document.getElementById('editor');
codeLines.forEach((line, idx) => {
  const div = document.createElement('div');
  div.className = 'code-line';
  if (line.trim() === '') {
    div.innerHTML = '&nbsp;';
  } else {
    div.innerHTML = highlightLine(line);
  }
  editorEl.appendChild(div);
});

let timerInterval = null;
let startTime = null;
let elapsedSeconds = 0;
let isRunning = false;
let speedFactor = 1;

const timerEl = document.getElementById('timer');
const outputEl = document.getElementById('output');

function runCode() {
  if (isRunning) return;
  isRunning = true;
  outputEl.innerHTML = '';
  startTime = Date.now();
  elapsedSeconds = 0;
  timerInterval = setInterval(() => {
    const now = Date.now();
    elapsedSeconds = (now - startTime) / 1000 * speedFactor;
    timerEl.textContent = `⏱ ${elapsedSeconds.toFixed(1)}s`;
  }, 100);
  
  const outputs = ["Estudar", "Praticar", "Revisar"];
  const delay = 500 / speedFactor;
  outputs.forEach((msg, idx) => {
    setTimeout(() => {
      const p = document.createElement('p');
      p.textContent = `> ${msg}`;
      outputEl.appendChild(p);
      if (idx === outputs.length - 1) {
        setTimeout(() => {
          clearInterval(timerInterval);
          timerInterval = null;
          isRunning = false;
        }, 200 / speedFactor);
      }
    }, (idx + 1) * delay);
  });
}

function resetAll() {
  clearInterval(timerInterval);
  timerInterval = null;
  isRunning = false;
  timerEl.textContent = '⏱ 0.0s';
  outputEl.innerHTML = '';
}

function toggleSpeed() {
  speedFactor = speedFactor === 1 ? 2 : 1;
}
</script>
</body>
</html>
