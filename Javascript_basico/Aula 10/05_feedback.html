<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>05_feedback</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
body { background: #f0f4f8; }
.topbar { background: #0891b2; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
.topbar h1 { font-size: 20px; }
.clock { font-size: 16px; }
.subtop { padding: 10px 20px; background: white; border-bottom: 1px solid #ddd; }
.badge { background: #0891b2; color: white; padding: 4px 12px; border-radius: 20px; font-size: 14px; }
.average-panel { background: white; margin: 20px; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.average-panel h2 { margin-bottom: 10px; }
.progress-bar { height: 20px; background: #ddd; border-radius: 10px; overflow: hidden; margin-top: 10px; }
.progress-fill { height: 100%; background: #0891b2; width: 0%; transition: width 0.3s; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; }
.card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.card h3 { margin-bottom: 10px; }
.stars { display: flex; gap: 5px; margin: 10px 0; }
.star { font-size: 24px; cursor: pointer; color: #ccc; }
.star.filled { color: #f1c40f; }
.criteria { margin: 10px 0; }
.criteria label { display: block; margin: 5px 0; }
.criteria input { margin-right: 5px; }
.observation { width: 100%; min-height: 60px; margin: 10px 0; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
.card-actions { display: flex; gap: 10px; margin-top: 10px; }
.btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 14px; }
.btn-apresentando { background: #3498db; }
.btn-concluido { background: #27ae60; }
.btn-remover { background: #e74c3c; }
.btn-add { background: #0891b2; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 0 20px 20px; }
.footer { background: #0891b2; color: white; text-align: center; padding: 10px; font-size: 14px; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
.modal-content { background: white; padding: 20px; border-radius: 8px; width: 300px; }
.modal-content h2 { margin-bottom: 15px; }
.modal-content input { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
</style>
</head>
<body>
<div class="topbar">
  <h1>📊 Painel de Apresentações — Aula 10</h1>
  <div class="clock" id="clock"></div>
</div>
<div class="subtop">
  <span class="badge" id="studentBadge">👥 0 Alunos</span>
</div>
<div class="average-panel">
  <h2>Média Geral: <span id="averageValue">0.0</span></h2>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>
<div class="cards-grid" id="cardsGrid"></div>
<button class="btn-add" id="addStudentBtn">+ Adicionar Aluno</button>
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Adicionar Aluno</h2>
    <input type="text" id="studentNameInput" placeholder="Nome do aluno">
    <div class="modal-actions">
      <button class="btn btn-concluido" id="modalAddBtn">Adicionar</button>
      <button class="btn btn-remover" id="modalCancelBtn">Cancelar</button>
    </div>
  </div>
</div>
<div class="footer">📊 Aula 10 · Projeto @karizeviecelli</div>
<script>
const CRITERIA = ["Planejou e estruturou o projeto corretamente", "Integrou HTML, CSS e JS de forma coesa", "Utilizou localStorage para persistência", "Publicou a aplicação online", "Código executa sem erros"];
const STORAGE_KEY = "feedback_aula10";

let students = loadStudents();

function loadStudents() {
  const data = localStorage.getItem(STORAGE_KEY);
  return data ? JSON.parse(data) : [];
}

function saveStudents() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(students));
  updateUI();
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString();
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  students.forEach((student, index) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <h3>${student.name}</h3>
      <div class="stars" data-student="${index}">
        ${Array.from({length: 5}, (_, i) => `<span class="star ${i < student.rating ? 'filled' : ''}" data-index="${i + 1}" data-star="true">★</span>`).join('')}
      </div>
      <div class="criteria">
        ${CRITERIA.map((crit, ci) => `
          <label><input type="checkbox" data-student="${index}" data-criteria="${ci}" ${student.criteria[ci] ? 'checked' : ''}> ${crit}</label>
        `).join('')}
      </div>
      <textarea class="observation" data-student="${index}" placeholder="Observação">${student.observation}</textarea>
      <div class="card-actions">
        <button class="btn btn-apresentando" data-student="${index}" data-action="apresentando">Apresentando</button>
        <button class="btn btn-concluido" data-student="${index}" data-action="concluido">Concluído</button>
        <button class="btn btn-remover" data-student="${index}" data-action="remover">Remover</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function updateStats() {
  const total = students.length;
  document.getElementById('studentBadge').textContent = `👥 ${total} Alunos`;
  let sum = 0;
  students.forEach(s => sum += s.rating);
  const avg = total > 0 ? (sum / total).toFixed(1) : '0.0';
  document.getElementById('averageValue').textContent = avg;
  const percent = total > 0 ? (sum / (total * 5)) * 100 : 0;
  document.getElementById('progressFill').style.width = percent + '%';
}

function updateUI() {
  renderCards();
  updateStats();
}

// Event delegation for dynamic cards
document.addEventListener('click', function(e) {
  const target = e.target;
  // Star clicks
  if (target.classList.contains('star')) {
    const studentIndex = parseInt(target.parentElement.dataset.student);
    const rating = parseInt(target.dataset.index);
    students[studentIndex].rating = rating;
    saveStudents();
  }
  // Action buttons
  if (target.tagName === 'BUTTON' && target.dataset.action) {
    const studentIndex = parseInt(target.dataset.student);
    const action = target.dataset.action;
    if (action === 'remover') {
      students.splice(studentIndex, 1);
      saveStudents();
    } else if (action === 'apresentando' || action === 'concluido') {
      students[studentIndex].status = action;
      saveStudents();
    }
  }
});

document.addEventListener('change', function(e) {
  // Checkboxes
  if (e.target.type === 'checkbox' && e.target.dataset.student !== undefined) {
    const studentIndex = parseInt(e.target.dataset.student);
    const criteriaIndex = parseInt(e.target.dataset.criteria);
    students[studentIndex].criteria[criteriaIndex] = e.target.checked;
    saveStudents();
  }
  // Textarea
  if (e.target.classList.contains('observation')) {
    const studentIndex = parseInt(e.target.dataset.student);
    students[studentIndex].observation = e.target.value;
    saveStudents();
  }
});

// Modal
const modal = document.getElementById('modal');
document.getElementById('addStudentBtn').addEventListener('click', () => {
  modal.style.display = 'flex';
  document.getElementById('studentNameInput').value = '';
});
document.getElementById('modalCancelBtn').addEventListener('click', () => {
  modal.style.display = 'none';
});
document.getElementById('modalAddBtn').addEventListener('click', () => {
  const name = document.getElementById('studentNameInput').value.trim();
  if (name) {
    students.push({
      name: name,
      rating: 0,
      criteria: [false, false, false, false, false],
      observation: '',
      status: 'pendente'
    });
    saveStudents();
    modal.style.display = 'none';
  }
});

updateClock();
setInterval(updateClock, 1000);
updateUI();
</script>
</body>
</html>
