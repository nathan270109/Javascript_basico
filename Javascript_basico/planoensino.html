<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plano de Ensino · JavaScript para Iniciantes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f6;
      --surface: #ffffff;
      --text: #1e1e2a;
      --text-muted: #6b6b7b;
      --accent: #e85d3a;
      --border: #e8e6e0;
      --radius: 12px;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      line-height: 1.6;
      padding: 0 20px;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'DM Serif Display', serif;
      font-weight: 400;
    }
    code {
      font-family: 'DM Mono', monospace;
      background: var(--border);
      padding: 0.2em 0.4em;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 0;
    }
    /* HERO */
    .hero {
      text-align: center;
      margin-bottom: 60px;
    }
    .badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .hero h1 {
      font-size: 3rem;
      margin-bottom: 8px;
    }
    .hero .subtitle {
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 32px;
    }
    .stat {
      text-align: center;
    }
    .stat .number {
      display: block;
      font-size: 2rem;
      font-weight: 600;
      font-family: 'DM Serif Display', serif;
    }
    .stat .label {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .code-preview {
      background: #1e1e2a;
      color: #f8f8f2;
      padding: 20px 24px;
      border-radius: var(--radius);
      text-align: left;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      max-width: 500px;
      margin: 0 auto;
      overflow-x: auto;
      box-shadow: var(--shadow);
    }
    .code-preview span.comment { color: #6272a4; }
    .code-preview span.keyword { color: #ff79c6; }
    .code-preview span.func { color: #50fa7b; }
    .code-preview span.string { color: #f1fa8c; }
    /* PHASE BAR */
    .phase-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    .phase-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 24px;
      border-radius: 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .phase-btn:hover,
    .phase-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    /* LESSONS GRID */
    .aulas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    .aula-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      transition: all 0.2s;
      cursor: pointer;
    }
    .aula-card:hover {
      border-color: var(--accent);
    }
    .aula-card .phase-tag {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 0.7rem;
      padding: 2px 10px;
      border-radius: 12px;
      margin-bottom: 8px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .aula-card h3 {
      font-size: 1.3rem;
      margin-bottom: 8px;
    }
    .aula-card h3 .num {
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-right: 4px;
    }
    .aula-card .sub {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 16px;
    }
    .aula-card .expand-area {
      display: none;
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .aula-card.expanded .expand-area {
      display: block;
    }
    .expand-area h4 {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .expand-area ul {
      list-style: none;
      padding: 0;
    }
    .expand-area li {
      position: relative;
      padding-left: 20px;
      margin-bottom: 4px;
    }
    .expand-area li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--accent);
    }
    .expand-btn {
      background: none;
      border: 1px solid var(--border);
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      margin-top: 12px;
      transition: all 0.2s;
    }
    .expand-btn:hover {
      background: var(--accent);
      color: #fff;
    }
    /* FOOTER */
    footer {
      text-align: center;
      padding: 32px 0;
      margin-top: 60px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    footer strong {
      color: var(--text);
    }
    /* Responsive */
    @media (max-width: 600px) {
      .hero h1 { font-size: 2rem; }
      .stats { gap: 20px; }
      .stat .number { font-size: 1.5rem; }
      .aulas-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HERO -->
    <section class="hero">
      <span class="badge">Curso Online · 10 Aulas</span>
      <h1>JavaScript para Iniciantes</h1>
      <p class="subtitle">Domine a linguagem do zero — da lógica ao DOM</p>
      <div class="stats">
        <div class="stat">
          <span class="number">10</span>
          <span class="label">Aulas</span>
        </div>
        <div class="stat">
          <span class="number">5</span>
          <span class="label">Fases</span>
        </div>
        <div class="stat">
          <span class="number">+60</span>
          <span class="label">Atividades</span>
        </div>
      </div>
      <div class="code-preview">
        <span class="keyword">let</span> nome = <span class="string">"Marina"</span>;
        <span class="func">console.log</span>(<span class="string">`Olá, ${nome}!`</span>); <span class="comment">// Hello, Marina!</span>
      </div>
    </section>

    <!-- PHASE BAR -->
    <nav class="phase-bar" id="phaseBar">
      <button class="phase-btn active" data-phase="all">Todas</button>
      <button class="phase-btn" data-phase="f1">Fundamentos</button>
      <button class="phase-btn" data-phase="f2">Lógica de Programação</button>
      <button class="phase-btn" data-phase="f3">Estruturas de Dados</button>
      <button class="phase-btn" data-phase="f4">DOM e Projeto</button>
      <button class="phase-btn" data-phase="f5">Projeto Final</button>
    </nav>

    <!-- AULAS GRID -->
    <div class="aulas-grid" id="aulasGrid"></div>

    <!-- FOOTER -->
    <footer>
      Plano de Ensino · JavaScript para Iniciantes · Projeto @karizeviecelli 💛
    </footer>
  </div>

  <script>
    const aulasData = [
      {
        num: "1",
        titulo: "Introdução ao JavaScript",
        sub: "Primeiros passos, console.log e pensamento computacional",
        grupo: "f1",
        conteudo: [
          "O que é JavaScript?",
          "Ferramentas: navegador e editor",
          "Seu primeiro programa",
          "Sintaxe básica",
          "Console.log como depurador",
          "Pensamento computacional",
          "Comentários no código",
          "Boas práticas iniciais"
        ],
        pratica: [
          "Escreva 'Olá, Mundo!' no console",
          "Crie um programa que some dois números",
          "Use console.log para mostrar seu nome",
          "Comente três linhas de código",
          "Identifique um erro de sintaxe",
          "Explique o que é pensamento computacional"
        ],
        objetivo: [
          "Configurar ambiente de desenvolvimento",
          "Escrever código JavaScript básico",
          "Entender a função do console.log",
          "Aplicar princípios do pensamento computacional"
        ]
      },
      {
        num: "2",
        titulo: "Variáveis e Constantes",
        sub: "let, const e tipos primitivos",
        grupo: "f1",
        conteudo: [
          "Declaração de variáveis com let",
          "Declaração de constantes com const",
          "Tipos primitivos: string, number, boolean",
          "typeof para verificar tipos",
          "Conversão de tipos",
          "Escopo de variáveis",
          "Boas práticas de nomeação",
          "Diferenças entre var, let e const"
        ],
        pratica: [
          "Declare três variáveis com let e atribua valores",
          "Crie uma constante para PI",
          "Use typeof para cada tipo primitivo",
          "Converta string para número",
          "Teste escopo com bloco if",
          "Renomeie variáveis seguindo padrão camelCase"
        ],
        objetivo: [
          "Declarar variáveis e constantes",
          "Diferenciar tipos primitivos",
          "Utilizar typeof",
          "Compreender escopo e boas práticas"
        ]
      },
      {
        num: "3",
        titulo: "Operadores",
        sub: "Aritméticos, relacionais e lógicos",
        grupo: "f2",
        conteudo: [
          "Operadores aritméticos (+, -, *, /, %)",
          "Operadores relacionais (>, <, >=, <=, ==, ===, !=)",
          "Operadores lógicos (&&, ||, !)",
          "Precedência de operadores",
          "Operadores de atribuição",
          "Operador ternário",
          "Incremento e decremento",
          "Exercícios de expressões"
        ],
        pratica: [
          "Calcule a média de três notas",
          "Verifique se um número é par ou ímpar",
          "Combine duas condições com &&",
          "Use || para verificar se uma variável é válida",
          "Escreva expressão com operador ternário",
          "Analise precedência em uma expressão complexa"
        ],
        objetivo: [
          "Utilizar operadores aritméticos",
          "Comparar valores com relacionais",
          "Combinar condições com lógicos",
          "Resolver expressões respeitando precedência"
        ]
      },
      {
        num: "4",
        titulo: "Estruturas de Decisão",
        sub: "if/else, switch e operador ternário",
        grupo: "f2",
        conteudo: [
          "Estrutura if/else",
          "Múltiplos else if",
          "Switch case",
          "Operador ternário para decisões simples",
          "Aninhamento de estruturas",
          "Condições com lógicos combinados",
          "Truthy e falsy",
          "Boas práticas em decisões"
        ],
        pratica: [
          "Crie um sistema de notas (A, B, C)",
          "Use switch para dia da semana",
          "Resolva um problema com ternário",
          "Combine if com &&",
          "Verifique se um número está em um intervalo",
          "Reescreva if/else como switch"
        ],
        objetivo: [
          "Implementar if/else para decisões",
          "Utilizar switch para múltiplos casos",
          "Aplicar operador ternário",
          "Avaliar condições com truthy/falsy"
        ]
      },
      {
        num: "5",
        titulo: "Laços de Repetição",
        sub: "for, while e do...while",
        grupo: "f2",
        conteudo: [
          "Laço for: estrutura e uso",
          "Laço while: quando usar",
          "Laço do...while: execução garantida",
          "Controle de fluxo: break e continue",
          "Laços aninhados",
          "Iteração sobre arrays",
          "Laço for...in e for...of (introdução)",
          "Evitando loops infinitos"
        ],
        pratica: [
          "Imprima números de 1 a 10 com for",
          "Escreva while que soma até 100",
          "Use do...while para ler entrada",
          "Pare um loop com break",
          "Pule um número com continue",
          "Crie uma tabuada com laço aninhado"
        ],
        objetivo: [
          "Implementar laços for",
          "Diferenciar while de do...while",
          "Controlar fluxo com break e continue",
          "Iterar sobre arrays"
        ]
      },
      {
        num: "6",
        titulo: "Arrays",
        sub: "Listas, índices e métodos",
        grupo: "f3",
        conteudo: [
          "Criação e acesso a arrays",
          "Índices e comprimento (length)",
          "Métodos push, pop, shift, unshift",
          "Métodos slice, splice, concat",
          "Iteração com forEach",
          "Métodos map, filter, reduce",
          "Busca com indexOf e includes",
          "Arrays multidimensionais"
        ],
        pratica: [
          "Crie um array de frutas e liste-as",
          "Adicione e remova itens com push/pop",
          "Use slice para copiar parte do array",
          "Filtre números pares com filter",
          "Transforme array com map",
          "Calcule soma com reduce"
        ],
        objetivo: [
          "Criar e manipular arrays",
          "Usar métodos principais",
          "Iterar com forEach",
          "Aplicar map, filter e reduce"
        ]
      },
      {
        num: "7",
        titulo: "Objetos",
        sub: "Propriedades, métodos e dados estruturados",
        grupo: "f3",
        conteudo: [
          "Criação de objetos literais",
          "Propriedades e valores",
          "Acesso com notação de ponto e colchetes",
          "Métodos em objetos",
          "Objetos aninhados",
          "Iteração com for...in",
          "Object.keys, values, entries",
          "JSON.stringify e JSON.parse"
        ],
        pratica: [
          "Crie um objeto pessoa com nome, idade, cidade",
          "Adicione um método que cumprimente",
          "Acesse propriedades com colchetes",
          "Itere sobre o objeto com for...in",
          "Converta objeto para JSON",
          "Crie um array de objetos e filtre"
        ],
        objetivo: [
          "Criar e acessar objetos",
          "Incluir métodos",
          "Navegar por objetos aninhados",
          "Converter para JSON"
        ]
      },
      {
        num: "8",
        titulo: "Funções",
        sub: "Parâmetros, retorno e reutilização",
        grupo: "f3",
        conteudo: [
          "Declaração de função",
          "Parâmetros e argumentos",
          "Retorno com return",
          "Escopo em funções",
          "Arrow functions",
          "Funções como argumento (callbacks)",
          "Parâmetros rest e default",
          "Funções anônimas"
        ],
        pratica: [
          "Crie função que receba dois números e retorne soma",
          "Escreva função que verifique se um número é positivo",
          "Use arrow function para multiplicar",
          "Crie um callback para filtrar array",
          "Implemente função com parâmetro default",
          "Chame uma função dentro de outra"
        ],
        objetivo: [
          "Declarar funções com parâmetros",
          "Retornar valores",
          "Utilizar arrow functions",
          "Entender callbacks e escopo"
        ]
      },
      {
        num: "9",
        titulo: "Manipulação do DOM",
        sub: "Selecionar, modificar e eventos",
        grupo: "f4",
        conteudo: [
          "O que é o DOM?",
          "Selecionar elementos: getElementById, querySelector",
          "Modificar conteúdo: textContent, innerHTML",
          "Modificar atributos e classes",
          "Criar e remover elementos",
          "Eventos: click, mouseover, keydown",
          "Evento load e DOMContentLoaded",
          "Delegação de eventos"
        ],
        pratica: [
          "Selecione um elemento e mude seu texto",
          "Adicione uma classe a um elemento",
          "Crie um botão que muda cor de fundo",
          "Capture tecla pressionada",
          "Crie uma lista dinâmica com input",
          "Implemente delegação de evento"
        ],
        objetivo: [
          "Selecionar elementos do DOM",
          "Modificar conteúdo e estilo",
          "Responder a eventos",
          "Criar elementos dinamicamente"
        ]
      },
      {
        num: "10",
        titulo: "Projeto Guiado",
        sub: "Construindo uma aplicação completa",
        grupo: "f5",
        conteudo: [
          "Planejamento do projeto",
          "Estrutura HTML semântica",
          "Estilização responsiva",
          "Lógica JavaScript central",
          "Manipulação do DOM avançada",
          "Uso de localStorage",
          "Testes e depuração",
          "Publicação no GitHub Pages"
        ],
        pratica: [
          "Defina o tema do projeto",
          "Crie o esqueleto HTML",
          "Implemente funcionalidade de adicionar item",
          "Use localStorage para persistir dados",
          "Adicione filtro de itens",
          "Publique online"
        ],
        objetivo: [
          "Planejar um projeto completo",
          "Integrar HTML, CSS e JS",
          "Utilizar localStorage",
          "Publicar aplicação"
        ]
      }
    ];

    const grid = document.getElementById('aulasGrid');
    const phaseBtns = document.querySelectorAll('.phase-btn');
    let currentPhase = 'all';

    function renderAulas(phase) {
      const filtered = phase === 'all' ? aulasData : aulasData.filter(a => a.grupo === phase);
      grid.innerHTML = filtered.map(aula => `
        <div class="aula-card" data-grupo="${aula.grupo}">
          <span class="phase-tag">${aula.grupo}</span>
          <h3><span class="num">${aula.num}.</span> ${aula.titulo}</h3>
          <p class="sub">${aula.sub}</p>
          <div class="expand-area">
            <h4>Conteúdo</h4>
            <ul>${aula.conteudo.map(item => `<li>${item}</li>`).join('')}</ul>
            <h4>Prática</h4>
            <ul>${aula.pratica.map(item => `<li>${item}</li>`).join('')}</ul>
            <h4>Objetivos</h4>
            <ul>${aula.objetivo.map(item => `<li>${item}</li>`).join('')}</ul>
          </div>
          <button class="expand-btn" onclick="toggleExpand(this)">Expandir</button>
        </div>
      `).join('');
    }

    window.toggleExpand = function(btn) {
      const card = btn.closest('.aula-card');
      card.classList.toggle('expanded');
      btn.textContent = card.classList.contains('expanded') ? 'Recolher' : 'Expandir';
    };

    phaseBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        phaseBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentPhase = this.dataset.phase;
        renderAulas(currentPhase);
      });
    });

    // Initial render
    renderAulas('all');
  </script>
</body>
</html>
