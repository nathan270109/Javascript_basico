<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aula 7 - Feedback</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background: #f0f2f5; padding-top: 60px; }
.topbar { position: fixed; top: 0; left: 0; right: 0; height: 50px; background: #2c3e50; color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; }
.topbar h1 { font-size: 18px; }
.clock { font-size: 16px; font-weight: bold; }
.sub-topo { background: #ecf0f1; padding: 15px 20px; border-bottom: 2px solid #bdc3c7; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
.sub-topo h2 { font-size: 16px; color: #2c3e50; }
.badge { background: #3498db; color: white; padding: 4px 12px; border-radius: 12px; font-size: 14px; }
.painel-media { background: white; margin: 20px; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 20px; }
.painel-media .valor { font-size: 48px; font-weight: bold; color: #2c3e50; min-width: 100px; }
.barra-container { flex: 1; height: 30px; background: #ecf0f1; border-radius: 15px; overflow: hidden; }
.barra { height: 100%; background: linear-gradient(90deg, #2ecc71, #27ae60); transition: width 0.5s; }
.grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; }
.card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: relative; }
.card .avatar { width: 50px; height: 50px; border-radius: 50%; background: #3498db; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin-bottom: 10px; }
.card h3 { font-size: 18px; margin-bottom: 5px; }
.card .status { font-size: 14px; margin-bottom: 10px; }
.card .status.concluido { color: #27ae60; }
.card .status.pendente { color: #e67e22; }
.stars { display: flex; gap: 5px; margin-bottom: 10px; }
.star { font-size: 24px; cursor: pointer; color: #f1c40f; }
.star.empty { color: #bdc3c7; }
.criterios { margin: 10px 0; }
.criterio { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.criterio input { width: 18px; height: 18px; cursor: pointer; }
.criterio label { font-size: 14px; }
.card textarea { width: 100%; height: 60px; border: 1px solid #bdc3c7; border-radius: 5px; padding: 5px; resize: vertical; font-size: 14px; }
.card .botoes { display: flex; gap: 10px; margin-top: 10px; }
.btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: 0.2s; }
.btn-primary { background: #3498db; color: white; }
.btn-primary:hover { background: #2980b9; }
.btn-success { background: #2ecc71; color: white; }
.btn-success:hover { background: #27ae60; }
.btn-danger { background: #e74c3c; color: white; }
.btn-danger:hover { background: #c0392b; }
.btn-add { display: block; margin: 20px auto; padding: 12px 24px; background: #2ecc71; color: white; border: none; border-radius: 25px; font-size: 16px; cursor: pointer; transition: 0.2s; }
.btn-add:hover { background: #27ae60; transform: scale(1.05); }
#modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
#modal-overlay.active { display: flex; }
#modal { background: white; padding: 30px; border-radius: 10px; width: 350px; max-width: 90%; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
#modal h2 { margin-bottom: 20px; }
#modal label { display: block; margin-bottom: 5px; font-weight: bold; }
#modal input, #modal select { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #bdc3c7; border-radius: 5px; }
#modal .modal-botoes { display: flex; gap: 10px; justify-content: flex-end; }
footer { background: #2c3e50; color: white; text-align: center; padding: 15px; margin-top: 20px; }
</style>
</head>
<body>
<div class="topbar" id="topbar">
  <h1>📊 Painel de Apresentações — Aula 7</h1>
  <div class="clock" id="clock"></div>
</div>

<div class="sub-topo">
  <h2>Aula 7 - Objetos — Propriedades, métodos e dados estruturados · 40 minutos</h2>
  <span class="badge" id="alunos-count">0 alunos</span>
</div>

<div class="painel-media">
  <div class="valor" id="media-valor">0.0</div>
  <div class="barra-container">
    <div class="barra" id="media-barra" style="width:0%"></div>
  </div>
</div>

<div class="grid-cards" id="grid-cards"></div>

<button class="btn-add" id="btn-add-aluno">+ Adicionar Aluno</button>

<div id="modal-overlay">
  <div id="modal">
    <h2>Adicionar Novo Aluno</h2>
    <label for="modal-nome">Nome:</label>
    <input type="text" id="modal-nome" placeholder="Nome do aluno">
    <label for="modal-status">Status:</label>
    <select id="modal-status">
      <option value="concluido">Concluído</option>
      <option value="pendente">Pendente</option>
    </select>
    <div class="modal-botoes">
      <button class="btn btn-danger" id="modal-cancelar">Cancelar</button>
      <button class="btn btn-success" id="modal-salvar">Salvar</button>
    </div>
  </div>
</div>

<footer>📊 Aula 7 · Projeto @karizeviecelli</footer>

<script>
(function() {
  // LocalStorage key
  const STORAGE_KEY = 'feedback_aula7';
  
  // Initial default students
  const defaultAlunos = [
    { nome: 'Ana', status: 'concluido', estrelas: 4, criterios: [true, false, false, false, false], observacao: '', id: Date.now() + 1 },
    { nome: 'Bruno', status: 'pendente', estrelas: 0, criterios: [false, false, false, false, false], observacao: '', id: Date.now() + 2 },
    { nome: 'Carla', status: 'concluido', estrelas: 5, criterios: [true, true, true, false, false], observacao: 'Bom trabalho', id: Date.now() + 3 }
  ];
  
  let alunos = carregarAlunos();
  let editingId = null;
  
  function carregarAlunos() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try { return JSON.parse(stored); }
      catch(e) { console.error('Erro ao carregar dados'); return [...defaultAlunos]; }
    } else {
      return [...defaultAlunos];
    }
  }
  
  function salvarAlunos() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(alunos));
  }
  
  function atualizarInterface() {
    renderizarCards();
    atualizarMedia();
    atualizarContagem();
  }
  
  function renderizarCards() {
    const grid = document.getElementById('grid-cards');
    grid.innerHTML = '';
    alunos.forEach(aluno => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = aluno.id;
      
      // Avatar
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = aluno.nome.charAt(0).toUpperCase();
      card.appendChild(avatar);
      
      // Nome
      const nome = document.createElement('h3');
      nome.textContent = aluno.nome;
      card.appendChild(nome);
      
      // Status
      const status = document.createElement('div');
      status.className = `status ${aluno.status}`;
      status.textContent = aluno.status === 'concluido' ? 'Concluído' : 'Pendente';
      card.appendChild(status);
      
      // Estrelas
      const estrelasDiv = document.createElement('div');
      estrelasDiv.className = 'stars';
      for (let i = 1; i <= 5; i++) {
        const star = document.createElement('span');
        star.className = `star ${i <= aluno.estrelas ? '' : 'empty'}`;
        star.textContent = '★';
        star.dataset.value = i;
        estrelasDiv.appendChild(star);
      }
      card.appendChild(estrelasDiv);
      
      // Critérios
      const criteriosDiv = document.createElement('div');
      criteriosDiv.className = 'criterios';
      const criteriosLabels = [
        'Criou e acessou objetos com propriedades',
        'Incluiu métodos nos objetos',
        'Navegou por objetos aninhados',
        'Converteu objetos para JSON',
        'Código executa sem erros'
      ];
      criteriosLabels.forEach((label, idx) => {
        const criterio = document.createElement('div');
        criterio.className = 'criterio';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = aluno.criterios[idx];
        cb.dataset.criterio = idx;
        const lbl = document.createElement('label');
        lbl.textContent = label;
        criterio.appendChild(cb);
        criterio.appendChild(lbl);
        criteriosDiv.appendChild(criterio);
      });
      card.appendChild(criteriosDiv);
      
      // Textarea
      const textarea = document.createElement('textarea');
      textarea.value = aluno.observacao;
      card.appendChild(textarea);
      
      // Botões
      const botoes = document.createElement('div');
      botoes.className = 'botoes';
      const btnSalvar = document.createElement('button');
      btnSalvar.className = 'btn btn-success';
      btnSalvar.textContent = 'Salvar';
      btnSalvar.addEventListener('click', function(e) {
        salvarAlunoCard(aluno.id);
      });
      const btnExcluir = document.createElement('button');
      btnExcluir.className = 'btn btn-danger';
      btnExcluir.textContent = 'Excluir';
      btnExcluir.addEventListener('click', function(e) {
        excluirAluno(aluno.id);
      });
      botoes.appendChild(btnSalvar);
      botoes.appendChild(btnExcluir);
      card.appendChild(botoes);
      
      grid.appendChild(card);
    });
  }
  
  function salvarAlunoCard(id) {
    const card = document.querySelector(`.card[data-id="${id}"]`);
    if (!card) return;
    const aluno = alunos.find(a => a.id === id);
    if (!aluno) return;
    
    // Estrelas
    const stars = card.querySelectorAll('.star');
    let estrelas = 0;
    stars.forEach(star => {
      if (!star.classList.contains('empty')) estrelas++;
    });
    aluno.estrelas = estrelas;
    
    // Critérios
    const checkboxes = card.querySelectorAll('.criterio input[type="checkbox"]');
    checkboxes.forEach((cb, idx) => {
      aluno.criterios[idx] = cb.checked;
    });
    
    // Observação
    const textarea = card.querySelector('textarea');
    aluno.observacao = textarea.value;
    
    salvarAlunos();
    atualizarInterface();
  }
  
  function excluirAluno(id) {
    alunos = alunos.filter(a => a.id !== id);
    salvarAlunos();
    atualizarInterface();
  }
  
  function atualizarMedia() {
    if (alunos.length === 0) {
      document.getElementById('media-valor').textContent = '0.0';
      document.getElementById('media-barra').style.width = '0%';
      return;
    }
    // Média baseada em estrelas (0 a 5)
    const totalEstrelas = alunos.reduce((acc, a) => acc + a.estrelas, 0);
    const media = totalEstrelas / alunos.length;
    document.getElementById('media-valor').textContent = media.toFixed(1);
    const percent = (media / 5) * 100;
    document.getElementById('media-barra').style.width = percent + '%';
  }
  
  function atualizarContagem() {
    document.getElementById('alunos-count').textContent = alunos.length + ' alunos';
  }
  
  // Event delegation for stars and checkboxes
  document.getElementById('grid-cards').addEventListener('click', function(e) {
    const star = e.target.closest('.star');
    if (star) {
      const card = star.closest('.card');
      const id = parseInt(card.dataset.id);
      const value = parseInt(star.dataset.value);
      const aluno = alunos.find(a => a.id === id);
      if (aluno) {
        aluno.estrelas = value;
        salvarAlunos();
        atualizarInterface();
      }
    }
  });
  
  // Checkbox change delegation
  document.getElementById('grid-cards').addEventListener('change', function(e) {
    if (e.target.type === 'checkbox' && e.target.closest('.criterio')) {
      const card = e.target.closest('.card');
      const id = parseInt(card.dataset.id);
      const idx = parseInt(e.target.dataset.criterio);
      const aluno = alunos.find(a => a.id === id);
      if (aluno) {
        aluno.criterios[idx] = e.target.checked;
        salvarAlunos();
        atualizarInterface();
      }
    }
  });
  
  // Textarea change delegation
  document.getElementById('grid-cards').addEventListener('input', function(e) {
    if (e.target.tagName === 'TEXTAREA') {
      const card = e.target.closest('.card');
      const id = parseInt(card.dataset.id);
      const aluno = alunos.find(a => a.id === id);
      if (aluno) {
        aluno.observacao = e.target.value;
        salvarAlunos();
      }
    }
  });
  
  // Modal
  const modalOverlay = document.getElementById('modal-overlay');
  const btnAdd = document.getElementById('btn-add-aluno');
  const modalCancelar = document.getElementById('modal-cancelar');
  const modalSalvar = document.getElementById('modal-salvar');
  const modalNome = document.getElementById('modal-nome');
  const modalStatus = document.getElementById('modal-status');
  
  btnAdd.addEventListener('click', function() {
    modalOverlay.classList.add('active');
    modalNome.value = '';
    modalStatus.value = 'concluido';
    editingId = null;
  });
  
  modalCancelar.addEventListener('click', function() {
    modalOverlay.classList.remove('active');
  });
  
  modalSalvar.addEventListener('click', function() {
    const nome = modalNome.value.trim();
    if (!nome) {
      alert('Informe o nome do aluno.');
      return;
    }
    const status = modalStatus.value;
    const novoAluno = {
      nome: nome,
      status: status,
      estrelas: 0,
      criterios: [false, false, false, false, false],
      observacao: '',
      id: Date.now()
    };
    alunos.push(novoAluno);
    salvarAlunos();
    atualizarInterface();
    modalOverlay.classList.remove('active');
  });
  
  // Close modal on overlay click
  modalOverlay.addEventListener('click', function(e) {
    if (e.target === modalOverlay) {
      modalOverlay.classList.remove('active');
    }
  });
  
  // Clock
  function updateClock() {
    const now = new Date();
    const timeString = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('clock').textContent = timeString;
  }
  updateClock();
  setInterval(updateClock, 1000);
  
  // Initial render
  atualizarInterface();
})();
</script>
</body>
</html>
