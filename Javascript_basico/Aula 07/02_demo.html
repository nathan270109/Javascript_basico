<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>02_demo</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f1f5f9;
  height: 100vh;
  overflow-y: auto;
}
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 50px;
  background: #0f172a;
  color: #f8fafc;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 10;
  font-size: 18px;
}
.controls {
  position: fixed;
  top: 50px;
  left: 0;
  width: 100%;
  height: 44px;
  background: #1e293b;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  z-index: 10;
}
.controls button {
  background: #334155;
  color: #f8fafc;
  border: none;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  transition: background 0.2s;
}
.controls button:hover {
  background: #475569;
}
.container {
  display: flex;
  margin-top: 94px;
  min-height: calc(100vh - 94px - 80px);
}
.editor {
  flex: 1;
  background: #1e293b;
  color: #e2e8f0;
  padding: 20px;
  font-family: 'Courier New', monospace;
  font-size: 15px;
  line-height: 1.6;
  overflow: auto;
  white-space: pre;
}
.editor code {
  display: block;
}
.editor .k { color: #c084fc; } /* keywords */
.editor .s { color: #facc15; } /* strings */
.editor .v { color: #67e8f9; } /* numbers */
.output {
  flex: 1;
  background: #ecfeff;
  padding: 20px;
  font-family: 'Courier New', monospace;
  font-size: 15px;
  line-height: 1.6;
  overflow: auto;
  white-space: pre-wrap;
}
.output .line {
  color: #0f172a;
}
.footer {
  position: relative;
  height: 80px;
  background: #0f172a;
  color: #94a3b8;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  font-size: 15px;
}
.footer a {
  display: inline-block;
  padding: 8px 16px;
  background: #3b82f6;
  color: #fff;
  text-decoration: none;
  border-radius: 6px;
  font-weight: 600;
}
</style>
</head>
<body>
<div class="topbar">
  <span>💻 Aula · Demonstração</span>
  <span id="timer">⏱ 00:00</span>
</div>
<div class="controls">
  <button id="runBtn">▶ Executar</button>
  <button id="resetBtn">⏹ Reset</button>
  <button id="fastBtn">⚡ Rápido</button>
</div>
<div class="container">
  <div class="editor">
    <code id="codeDisplay">
<span class="k">let</span> frutas = [<span class="s">"maçã"</span>, <span class="s">"banana"</span>, <span class="s">"uva"</span>];
<span class="k">console</span>.<span class="k">log</span>(frutas[<span class="v">0</span>]);
<span class="k">console</span>.<span class="k">log</span>(frutas.<span class="k">length</span>);
frutas.<span class="k">push</span>(<span class="s">"laranja"</span>);
    </code>
  </div>
  <div class="output" id="output">
    <div id="outputContent"></div>
  </div>
</div>
<div class="footer">
  <span>💻 Aula · Projeto @karizeviecelli</span>
  <a href="03_pratica.html">➜ Seguir para a Prática</a>
</div>
<textarea id="codeInput" style="display:none;">let frutas = ["maçã", "banana", "uva"];
console.log(frutas[0]);
console.log(frutas.length);
frutas.push("laranja");</textarea>
<script>
(function() {
  const codeInput = document.getElementById('codeInput');
  const outputContent = document.getElementById('outputContent');
  const runBtn = document.getElementById('runBtn');
  const resetBtn = document.getElementById('resetBtn');
  const timerEl = document.getElementById('timer');
  
  let seconds = 0;
  let timerInterval = null;
  function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(() => {
      seconds++;
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      timerEl.textContent = `⏱ ${m}:${s}`;
    }, 1000);
  }
  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }
  function resetTimer() {
    stopTimer();
    seconds = 0;
    timerEl.textContent = '⏱ 00:00';
  }
  
  let outputLines = [];
  let typewriterTimer = null;
  
  function runCode() {
    // Clear previous output
    outputContent.innerHTML = '';
    if (typewriterTimer) {
      clearTimeout(typewriterTimer);
      typewriterTimer = null;
    }
    
    // Capture console.log
    const logs = [];
    const originalLog = console.log;
    console.log = function(...args) {
      logs.push(args.map(arg => {
        if (typeof arg === 'object') {
          return JSON.stringify(arg, null, 2);
        }
        return String(arg);
      }).join(' '));
      originalLog.apply(console, args);
    };
    
    try {
      eval(codeInput.value);
    } catch (e) {
      logs.push('Error: ' + e.message);
    } finally {
      console.log = originalLog;
    }
    
    outputLines = logs;
    // Start typewriter effect
    let i = 0;
    function addLine() {
      if (i < outputLines.length) {
        const line = document.createElement('div');
        line.className = 'line';
        line.textContent = '> ' + outputLines[i];
        outputContent.appendChild(line);
        i++;
        typewriterTimer = setTimeout(addLine, 300);
      }
    }
    addLine();
    startTimer();
  }
  
  function resetCode() {
    // Clear output
    outputContent.innerHTML = '';
    if (typewriterTimer) {
      clearTimeout(typewriterTimer);
      typewriterTimer = null;
    }
    resetTimer();
    // Optionally reset code display? Not needed.
  }
  
  runBtn.addEventListener('click', runCode);
  resetBtn.addEventListener('click', resetCode);
  document.getElementById('fastBtn').addEventListener('click', function() {
    // Just a placeholder; could speed up typewriter or something
    // For now, do nothing
  });
  
  // Auto-run on page load? Not specified; leave to user.
})();
</script>
</body>
</html>
