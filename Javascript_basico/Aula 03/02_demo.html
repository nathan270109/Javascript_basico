<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula 3 - Operadores</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 1000;
      border-bottom: 2px solid #38bdf8;
    }
    #topbar h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 1px;
    }
    #timer {
      background: #1e293b;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.9rem;
      border: 1px solid #38bdf8;
      color: #38bdf8;
      font-weight: bold;
    }
    #controls {
      position: fixed;
      top: 50px;
      left: 0;
      width: 100%;
      height: 44px;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 20px;
      z-index: 999;
      border-bottom: 1px solid #334155;
    }
    #controls button {
      background: #334155;
      border: none;
      color: #f1f5f9;
      padding: 6px 18px;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    #controls button:hover {
      background: #475569;
    }
    #controls button:active {
      transform: scale(0.95);
    }
    #controls .active {
      background: #38bdf8;
      color: #0f172a;
    }
    #container {
      display: flex;
      flex: 1;
      margin-top: 94px;
      min-height: calc(100vh - 94px - 60px);
    }
    #editor-pane {
      flex: 1;
      background: #1e293b;
      color: #e2e8f0;
      padding: 16px;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.95rem;
      line-height: 1.6;
      overflow: auto;
      white-space: pre-wrap;
      border-right: 2px solid #334155;
    }
    #editor-pane .line-number {
      color: #64748b;
      margin-right: 12px;
      user-select: none;
    }
    #editor-pane .code-line {
      display: block;
    }
    #editor-pane .highlight-keyword { color: #38bdf8; }
    #editor-pane .highlight-value { color: #a78bfa; }
    #editor-pane .highlight-string { color: #4ade80; }
    #editor-pane .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: #38bdf8;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink {
      50% { background: transparent; }
    }
    #output-pane {
      flex: 1;
      background: #ecfeff;
      padding: 16px;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.95rem;
      line-height: 1.6;
      overflow: auto;
      color: #0f172a;
    }
    #output-pane .output-line {
      display: block;
      padding: 2px 0;
    }
    #output-pane .output-arrow {
      color: #64748b;
      margin-right: 8px;
    }
    #output-pane .output-result {
      color: #0f172a;
    }
    footer {
      background: #1e293b;
      color: #94a3b8;
      padding: 12px 20px;
      text-align: center;
      font-size: 0.85rem;
      position: relative;
      border-top: 2px solid #38bdf8;
    }
    footer a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: 500;
      margin-left: 10px;
    }
    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="topbar">
    <h1>📘 Aula 3 - Operadores</h1>
    <div id="timer">00:00</div>
  </div>
  <div id="controls">
    <button id="btn-executar">▶ Executar</button>
    <button id="btn-reset">⏹ Reset</button>
    <button id="btn-rapido">⚡ Rápido</button>
  </div>
  <div id="container">
    <div id="editor-pane"></div>
    <div id="output-pane"></div>
  </div>
  <footer>
    💻 Aula 3 · Projeto @karizeviecelli
    <a href="03_pratica.html" target="_blank">➜ Seguir para a Prática</a>
  </footer>

  <script>
    const codeLines = [
      "let a = 10;",
      "let b = 3;",
      "console.log(a + b);",
      "console.log(a > b);",
      "let maior = a > b;",
      "console.log(maior);"
    ];

    const editorPane = document.getElementById('editor-pane');
    const outputPane = document.getElementById('output-pane');
    const timerEl = document.getElementById('timer');
    const btnExecutar = document.getElementById('btn-executar');
    const btnReset = document.getElementById('btn-reset');
    const btnRapido = document.getElementById('btn-rapido');

    let isRunning = false;
    let isFast = false;
    let currentLine = 0;
    let currentChar = 0;
    let timerInterval = null;
    let seconds = 0;
    let typeInterval = null;

    // The expected outputs: each console.log (lines 3,4,6) produces one output
    const expectedOutputs = ["13", "true", "true"];
    let outputIndex = 0;

    function formatTimer(sec) {
      const m = String(Math.floor(sec / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    function startTimer() {
      seconds = 0;
      timerEl.textContent = formatTimer(0);
      timerInterval = setInterval(() => {
        seconds++;
        timerEl.textContent = formatTimer(seconds);
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
    }

    function resetTimer() {
      stopTimer();
      seconds = 0;
      timerEl.textContent = formatTimer(0);
    }

    function resetAll() {
      stopTimer();
      resetTimer();
      clearInterval(typeInterval);
      isRunning = false;
      currentLine = 0;
      currentChar = 0;
      outputIndex = 0;
      editorPane.innerHTML = '';
      outputPane.innerHTML = '';
      btnExecutar.disabled = false;
    }

    function typeNextChar() {
      if (currentLine >= codeLines.length) {
        // typing finished
        clearInterval(typeInterval);
        isRunning = false;
        stopTimer();
        btnExecutar.disabled = false;
        applySyntaxHighlighting();
        // show remaining outputs (if any) already shown during typing
        return;
      }

      const line = codeLines[currentLine];
      if (currentChar === 0) {
        // start new line: add line element
        const lineDiv = document.createElement('div');
        lineDiv.className = 'code-line';
        lineDiv.id = `line-${currentLine}`;
        const lineNum = document.createElement('span');
        lineNum.className = 'line-number';
        lineNum.textContent = String(currentLine + 1).padStart(2, '0');
        lineDiv.appendChild(lineNum);
        // add a span for the text
        const textSpan = document.createElement('span');
        textSpan.className = 'code-text';
        textSpan.id = `text-${currentLine}`;
        lineDiv.appendChild(textSpan);
        editorPane.appendChild(lineDiv);
      }

      const textSpan = document.getElementById(`text-${currentLine}`);
      if (currentChar < line.length) {
        textSpan.textContent += line[currentChar];
        currentChar++;
        // scroll to bottom
        editorPane.scrollTop = editorPane.scrollHeight;
      } else {
        // line complete
        // if this line is a console.log, add output
        if (line.startsWith('console.log')) {
          if (outputIndex < expectedOutputs.length) {
            const outputDiv = document.createElement('div');
            outputDiv.className = 'output-line';
            const arrowSpan = document.createElement('span');
            arrowSpan.className = 'output-arrow';
            arrowSpan.textContent = '>';
            const resultSpan = document.createElement('span');
            resultSpan.className = 'output-result';
            resultSpan.textContent = expectedOutputs[outputIndex];
            outputIndex++;
            outputDiv.appendChild(arrowSpan);
            outputDiv.appendChild(resultSpan);
            outputPane.appendChild(outputDiv);
          }
        }
        // move to next line
        currentLine++;
        currentChar = 0;
      }
    }

    function applySyntaxHighlighting() {
      // Highlight keywords: let, console
      // Highlight values: numbers, true
      // Highlight strings: none in this code
      const codeTextSpans = document.querySelectorAll('.code-text');
      codeTextSpans.forEach(span => {
        let text = span.textContent;
        // Replace 'let' keyword
        text = text.replace(/\blet\b/g, '<span class="highlight-keyword">let</span>');
        // Replace 'console' keyword (part of console.log)
        text = text.replace(/\bconsole\b/g, '<span class="highlight-keyword">console</span>');
        // Replace numbers (integers)
        text = text.replace(/\b(\d+)\b/g, '<span class="highlight-value">$1</span>');
        // Replace 'true' and 'false'
        text = text.replace(/\btrue\b/g, '<span class="highlight-value">true</span>');
        text = text.replace(/\bfalse\b/g, '<span class="highlight-value">false</span>');
        // No strings in this example, but if present would use highlight-string
        span.innerHTML = text;
      });
    }

    btnExecutar.addEventListener('click', function() {
      if (isRunning) return;
      resetAll();
      isRunning = true;
      btnExecutar.disabled = true;
      startTimer();
      const speed = isFast ? 20 : 80;
      typeInterval = setInterval(typeNextChar, speed);
    });

    btnReset.addEventListener('click', function() {
      resetAll();
    });

    btnRapido.addEventListener('click', function() {
      isFast = !isFast;
      btnRapido.classList.toggle('active', isFast);
    });
  </script>
</body>
</html>
